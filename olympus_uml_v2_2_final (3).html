
<style>
.uw{padding:.5rem 0}
.ubar{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.ubtn{font-size:11px;padding:3px 10px;border:0.5px solid var(--color-border-secondary);border-radius:6px;background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.ubtn:hover{background:var(--color-background-secondary)}
#ubox{width:100%;overflow:auto;max-height:580px;border-radius:10px;border:0.5px solid var(--color-border-tertiary)}
</style>
<div class="uw">
<div class="ubar">
  <button class="ubtn" id="bZI">+ Zoom</button>
  <button class="ubtn" id="bZO">− Zoom</button>
  <button class="ubtn" id="bZR">Resetear</button>
  <span id="bZL" style="font-size:11px;color:var(--color-text-secondary)">100%</span>
  <span style="font-size:11px;color:var(--color-text-secondary)">— desplaza para explorar todo el diagrama</span>
</div>
<div id="ubox">
  <svg id="usvg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>
</div>
<script>
const W=1900,H=1810,BW=380,HD=34,ORX=170,ORY=13,OSTART=58,OSTEP=36;
const CX=[150,550,950,1350];
const RH=[{y:40,h:290},{y:370,h:360},{y:770,h:290},{y:1100,h:290},{y:1430,h:250}];
const ACT={
  h:{x:62,y:560,col:'#60a5fa',lbl:['USUARIO','(HOMBRE)']},
  m:{x:62,y:1040,col:'#f472b6',lbl:['USUARIO','(MUJER)']},
  a:{x:1842,y:1555,col:'#34d399',lbl:['ADMINIS-','TRADOR']}
};
const MODS=[
  {r:0,c:0,l1:'1. Rutinas Personalizadas',l2:null,hc:'#7c3aed',ac:['h','m'],uc:['Generar rutina por objetivo','Por equipamiento disponible','Según nivel calculado','Según días disponibles','&lt;&lt;ext&gt;&gt; Adaptar fase menstrual']},
  // Pilar 2: eliminado 'No recalcular en fase lútea'
  {r:0,c:1,l1:'2. Consciencia Ciclo',l2:'Menstrual',hc:'#db2777',ac:['m'],uc:['Notificaciones por fase','Protección racha automática','Bonus XP fase menstrual','Ajuste expectativas por fase']},
  {r:0,c:2,l1:'3. Multi-Deporte',l2:'+ Wearables',hc:'#0891b2',ac:['h','m'],uc:['Natación / Ciclismo / Running','Escalada / Gym','Sync Health Connect Android','Sync Apple HealthKit iOS','Día completado desde reloj']},
  {r:0,c:3,l1:'4. Gamificación',l2:'Inteligente',hc:'#d97706',ac:['h','m'],uc:['Sistema de XP','Racha inteligente','Logros / Hitos','Niveles y Rangos','Retos semanales rotativos','Moneda In-App (mes 5+)']},
  {r:1,c:0,l1:'5. ChatBot Olympus',l2:'Flotante Global',hc:'#2563eb',ac:['h','m'],uc:['Botón flotante global','Voz bidireccional STT/TTS','Sin memoria entre sesiones','Contexto de pantalla activa','Registro entrenamiento voz','Instrucciones en entrenamiento']},
  {r:1,c:1,l1:'01. Autenticación',l2:'y Perfil',hc:'#374151',ac:['h','m'],uc:['Registrarse en la aplicación','Iniciar sesión','&lt;&lt;incl&gt;&gt; Google / Apple','Recuperar contraseña','Cerrar sesión']},
  {r:1,c:2,l1:'02. Onboarding',l2:null,hc:'#374151',ac:['h','m'],uc:['Sexo / Peso / Altura','Objetivo de entrenamiento','Equipamiento disponible','Cuestionario de nivel (5 preg)','Deportes adicionales','Días disponibles','&lt;&lt;ext&gt;&gt; Registro menstrual','Confirmación del perfil']},
  {r:1,c:3,l1:'03. Dashboard',l2:null,hc:'#6d28d9',ac:['h','m'],uc:['Racha semanal visual','Rutina del día','Retos activos','XP y nivel','&lt;&lt;ext&gt;&gt; Notif. menstrual']},
  {r:2,c:0,l1:'04. Gestión',l2:'de Rutinas',hc:'#15803d',ac:['h','m'],uc:['Rutinas generadas por perfil','Crear rutina personalizada','Configurar series/reps/peso','Editar / Eliminar rutina','Guardar como plantilla']},
  {r:2,c:1,l1:'05. Ejecución',l2:'de Rutinas',hc:'#15803d',ac:['h','m'],uc:['Ver instrucciones ejercicio','Registrar series y peso','&lt;&lt;cx&gt;&gt; Registrar por voz','&lt;&lt;cx&gt;&gt; Instrucciones voz','Ver técnica del ejercicio','Pausar / Finalizar rutina']},
  {r:2,c:2,l1:'06. Seguimiento',l2:'y Progreso',hc:'#1d4ed8',ac:['h','m'],uc:['Evolución de peso','Gráficas de volumen','Historial de entrenamientos','Deportes trackeados','Récords personales','Descargar reporte']},
  {r:2,c:3,l1:'07. Nutrición',l2:'y Salud',hc:'#374151',ac:['h','m'],uc:['Recomendaciones nutricionales','Control de hidratación']},
  {r:3,c:0,l1:'08. Ciclo Menstrual',l2:'(usuario)',hc:'#be185d',ac:['m'],uc:['Registrar ciclo','Ver fases del ciclo','Notificaciones por fase','&lt;&lt;cx&gt;&gt; ChatBot conoce fase']},
  {r:3,c:1,l1:'09. Comunidad',l2:'y Motivación',hc:'#374151',ac:['h','m'],uc:['Ver logros y medallas','Desafíos personales','Publicaciones y reseñas','Grupos y desafíos']},
  {r:3,c:2,l1:'10. Notificaciones',l2:null,hc:'#374151',ac:['h','m'],uc:['Recordatorios de entreno','Recordatorios hidratación','Notificaciones de racha','&lt;&lt;ext&gt;&gt; Notif. ciclo menstrual','Config. notificaciones']},
  {r:4,c:0,l1:'11. Gestión',l2:'de Usuarios',hc:'#065f46',ac:['a'],uc:['Ver usuarios registrados','Ver estadísticas de uso','Ver historial de actividad','Gestionar roles y permisos']},
  {r:4,c:1,l1:'12. Gestión',l2:'de Contenido',hc:'#065f46',ac:['a'],uc:['Gestionar ejercicios','Rutinas predefinidas','Planes de alimentación','Videos y consejos','Categorías y etiquetas']},
  {r:4,c:2,l1:'13. Gestión',l2:'del ChatBot',hc:'#065f46',ac:['a'],uc:['Base de respuestas','Configurar STT / TTS','Contextos por pantalla','Ajustar modelo de IA','Métricas de uso']},
  {r:4,c:3,l1:'14. Config.',l2:'del Sistema',hc:'#065f46',ac:['a'],uc:['Configuración general','Parámetros del sistema','Copias de seguridad','Monitoreo del sistema','Auditoría de actividades']},
];

function dFig(x,y,col,lbl){
  let s=`<circle cx="${x}" cy="${y-30}" r="11" fill="none" stroke="${col}" stroke-width="1.5"/>`;
  s+=`<line x1="${x}" y1="${y-19}" x2="${x}" y2="${y+5}" stroke="${col}" stroke-width="1.5"/>`;
  s+=`<line x1="${x}" y1="${y-10}" x2="${x-16}" y2="${y+5}" stroke="${col}" stroke-width="1.5"/>`;
  s+=`<line x1="${x}" y1="${y-10}" x2="${x+16}" y2="${y+5}" stroke="${col}" stroke-width="1.5"/>`;
  s+=`<line x1="${x}" y1="${y+5}" x2="${x-13}" y2="${y+26}" stroke="${col}" stroke-width="1.5"/>`;
  s+=`<line x1="${x}" y1="${y+5}" x2="${x+13}" y2="${y+26}" stroke="${col}" stroke-width="1.5"/>`;
  lbl.forEach((l,i)=>{s+=`<text x="${x}" y="${y+42+i*14}" text-anchor="middle" fill="${col}" font-size="11" font-weight="500" font-family="sans-serif">${l}</text>`;});
  return s;
}

function dBox(m){
  const bx=CX[m.c],by=RH[m.r].y,bh=RH[m.r].h,mx=bx+BW/2;
  const AL={h:'#93c5fd',m:'#f9a8d4',a:'#6ee7b7'};
  let s=`<rect x="${bx}" y="${by}" width="${BW}" height="${bh}" rx="4" fill="#111827" stroke="${m.hc}" stroke-width="0.8" stroke-opacity="0.55"/>`;
  s+=`<rect x="${bx}" y="${by}" width="${BW}" height="${HD}" rx="4" fill="${m.hc}"/>`;
  s+=`<rect x="${bx}" y="${by+HD-5}" width="${BW}" height="5" fill="${m.hc}"/>`;
  if(m.l2){
    s+=`<text x="${mx}" y="${by+HD/2-5}" text-anchor="middle" dominant-baseline="central" fill="white" font-size="11" font-weight="500" font-family="sans-serif">${m.l1}</text>`;
    s+=`<text x="${mx}" y="${by+HD/2+8}" text-anchor="middle" dominant-baseline="central" fill="white" font-size="11" font-weight="500" font-family="sans-serif">${m.l2}</text>`;
  } else {
    s+=`<text x="${mx}" y="${by+HD/2+1}" text-anchor="middle" dominant-baseline="central" fill="white" font-size="${m.l1.length>22?11:12}" font-weight="500" font-family="sans-serif">${m.l1}</text>`;
  }
  m.ac.forEach((id,i)=>{s+=`<circle cx="${bx+BW-12-i*14}" cy="${by+HD/2}" r="5" fill="${AL[id]}"/>`;});
  m.uc.forEach((u,i)=>{
    const oy=by+OSTART+i*OSTEP;
    s+=`<ellipse cx="${mx}" cy="${oy}" rx="${ORX}" ry="${ORY}" fill="none" stroke="#1e2d3d" stroke-width="1"/>`;
    s+=`<text x="${mx}" y="${oy}" text-anchor="middle" dominant-baseline="central" fill="#94a3b8" font-size="10.5" font-family="sans-serif">${u}</text>`;
  });
  return s;
}

function dLines(){
  const SC={h:'#3b82f6',m:'#ec4899',a:'#10b981'};
  let s='';
  MODS.forEach(m=>{
    const bx=CX[m.c],bcy=RH[m.r].y+RH[m.r].h/2;
    m.ac.forEach(id=>{
      const a=ACT[id],lx=a.x<bx?bx:bx+BW;
      s+=`<line x1="${a.x}" y1="${a.y}" x2="${lx}" y2="${bcy}" stroke="${SC[id]}" stroke-width="0.5" stroke-opacity="0.38"/>`;
    });
  });
  return s;
}

function dSectionLabels(){
  const labels=[
    {y:40,h:290,t:'PILARES DEL PRODUCTO (1–4)'},
    {y:370,h:360,t:'PILAR 5 + MÓDULOS 01–03'},
    {y:770,h:290,t:'MÓDULOS 04–07'},
    {y:1100,h:290,t:'MÓDULOS 08–10'},
    {y:1430,h:250,t:'GESTIÓN ADMINISTRATIVA'}
  ];
  let s='';
  labels.forEach(l=>{
    const cy=l.y+l.h/2;
    s+=`<text transform="rotate(-90,130,${cy})" x="130" y="${cy}" text-anchor="middle" fill="#1e2d3d" font-size="9" font-family="sans-serif" letter-spacing="1">${l.t}</text>`;
  });
  return s;
}

const svg=document.getElementById('usvg');
svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
svg.setAttribute('width',W);
svg.setAttribute('height',H);

let h=`<rect width="${W}" height="${H}" fill="#0d1117"/>`;
h+=`<text x="${W/2}" y="14" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600" letter-spacing="4" font-family="sans-serif">OLYMPUS</text>`;
h+=`<text x="${W/2}" y="26" text-anchor="middle" fill="#374151" font-size="8.5" letter-spacing="1" font-family="sans-serif">GESTIÓN DE APLICACIÓN FITNESS — DIAGRAMA DE CASOS DE USO v2.1</text>`;
h+=`<rect x="138" y="32" width="1614" height="1660" rx="6" fill="none" stroke="#1a2235" stroke-width="1" stroke-dasharray="10,5"/>`;
h+=dSectionLabels();
h+=dLines();
MODS.forEach(m=>{h+=dBox(m);});
Object.values(ACT).forEach(a=>{h+=dFig(a.x,a.y,a.col,a.lbl);});

const LY=1710;
h+=`<rect x="138" y="${LY-6}" width="1614" height="84" rx="4" fill="#0a0f1a" stroke="#1a2235" stroke-width="0.5"/>`;
h+=`<text x="155" y="${LY+8}" fill="#374151" font-size="9" font-family="sans-serif">NOTAS:</text>`;
h+=`<text x="205" y="${LY+8}" fill="#6366f1" font-size="9" font-family="sans-serif">&lt;&lt;include&gt;&gt;:</text>`;
h+=`<text x="278" y="${LY+8}" fill="#4b5563" font-size="9" font-family="sans-serif">caso base siempre incluye al relacionado</text>`;
h+=`<text x="600" y="${LY+8}" fill="#6366f1" font-size="9" font-family="sans-serif">&lt;&lt;extend&gt;&gt;:</text>`;
h+=`<text x="664" y="${LY+8}" fill="#4b5563" font-size="9" font-family="sans-serif">extiende funcionalidad (opcional)</text>`;
h+=`<text x="930" y="${LY+8}" fill="#6366f1" font-size="9" font-family="sans-serif">&lt;&lt;cx&gt;&gt;:</text>`;
h+=`<text x="964" y="${LY+8}" fill="#4b5563" font-size="9" font-family="sans-serif">conexión entre módulos del sistema</text>`;
h+=`<text x="1230" y="${LY+8}" fill="#4b5563" font-size="9" font-family="sans-serif">— — —  asociación actor → módulo</text>`;
[{c:'#60a5fa',t:'Usuario Hombre: rutinas, progreso, gamificación, ChatBot, multi-deporte, nutrición'},{c:'#f472b6',t:'Usuario Mujer: todo lo anterior + ciclo menstrual (módulos P2 y 08)'},{c:'#34d399',t:'Administrador: gestión de usuarios, contenido, ChatBot y sistema'}].forEach((a,i)=>{
  const ax=155+i*520;
  h+=`<circle cx="${ax+5}" cy="${LY+38}" r="5" fill="${a.c}"/>`;
  h+=`<text x="${ax+16}" y="${LY+38}" dominant-baseline="central" fill="#6b7280" font-size="9.5" font-family="sans-serif">${a.t}</text>`;
});
h+=`<text x="155" y="${LY+64}" fill="#1a2235" font-size="8.5" font-family="sans-serif">OLYMPUS — App de Cultura Física Personalizada v2.1 — Todos los derechos reservados</text>`;
svg.innerHTML=h;

let sc=1;
const upd=()=>{svg.setAttribute('width',Math.round(W*sc));svg.setAttribute('height',Math.round(H*sc));document.getElementById('bZL').textContent=Math.round(sc*100)+'%';};
document.getElementById('bZI').onclick=()=>{sc=Math.min(3,sc*1.3);upd();};
document.getElementById('bZO').onclick=()=>{sc=Math.max(0.25,sc/1.3);upd();};
document.getElementById('bZR').onclick=()=>{sc=1;upd();};
</script>
